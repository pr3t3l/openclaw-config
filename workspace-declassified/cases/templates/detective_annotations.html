<!-- detective_annotations.html — Inject this BEFORE </body> in any rendered document -->
<!-- The annotations array is injected as JSON by the Layout Planner from experience_design.json -->

<style>
/* ============================================
   DETECTIVE ANNOTATION OVERLAY — V8
   Adds sticky notes, margin comments, highlights,
   circled text, arrows, and question marks.
   ============================================ */

/* --- STICKY NOTE --- */
.det-sticky {
    position: absolute;
    width: 140px;
    padding: 10px 12px;
    font-family: 'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive;
    font-size: 8.5pt;
    line-height: 1.3;
    transform: rotate(var(--rotation, -2deg));
    z-index: 100;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.2);
}
.det-sticky.yellow {
    background: #fff9b1;
    border-bottom: 3px solid #e6d96e;
}
.det-sticky.pink {
    background: #ffcce0;
    border-bottom: 3px solid #e6a0b8;
}
.det-sticky.blue {
    background: #c8e6ff;
    border-bottom: 3px solid #92c4e6;
}
.det-sticky.green {
    background: #c8f7c5;
    border-bottom: 3px solid #8fd88a;
}

/* --- MARGIN COMMENT --- */
.det-margin {
    position: absolute;
    right: -10px;
    width: 120px;
    padding: 6px 8px;
    font-family: 'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive;
    font-size: 7.5pt;
    line-height: 1.3;
    color: #333;
    border-left: 2px solid #c00;
    background: transparent;
    z-index: 90;
}
.det-margin.hasty {
    font-style: italic;
    letter-spacing: -0.3px;
}
.det-margin.careful {
    font-style: normal;
    letter-spacing: 0.2px;
}

/* --- HIGHLIGHT --- */
.det-highlight {
    background: linear-gradient(180deg, transparent 55%, rgba(255,255,0,0.45) 55%);
    padding: 0 2px;
}
.det-highlight.red {
    background: linear-gradient(180deg, transparent 55%, rgba(255,100,100,0.35) 55%);
}
.det-highlight.green {
    background: linear-gradient(180deg, transparent 55%, rgba(100,255,100,0.3) 55%);
}

/* --- CIRCLED TEXT --- */
.det-circled {
    border: 2px solid #c00;
    border-radius: 50%;
    padding: 2px 6px;
    display: inline-block;
}

/* --- QUESTION MARK --- */
.det-question {
    position: absolute;
    font-family: 'Comic Sans MS', 'Segoe Print', cursive;
    font-size: 18pt;
    font-weight: bold;
    color: #c00;
    transform: rotate(var(--rotation, 5deg));
    z-index: 95;
}

/* --- ARROW CONNECTION (drawn with CSS border trick) --- */
.det-arrow {
    position: absolute;
    border-left: 2px solid #c00;
    border-bottom: 2px solid #c00;
    width: 40px;
    height: 20px;
    z-index: 85;
}
.det-arrow::after {
    content: '→';
    position: absolute;
    right: -12px;
    bottom: -8px;
    font-size: 12pt;
    color: #c00;
}

/* --- TAPE STRIP (for sticky notes) --- */
.det-tape {
    position: absolute;
    width: 50px;
    height: 14px;
    background: rgba(200,200,180,0.6);
    transform: rotate(var(--tape-rotation, -5deg));
    top: -7px;
    left: 40%;
    z-index: 101;
}

/* --- COFFEE STAIN (immersion element) --- */
.det-coffee-stain {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(139,90,43,0.12) 50%, rgba(139,90,43,0.06) 70%, transparent 80%);
    z-index: 80;
    pointer-events: none;
}

/* --- INK SMUDGE (immersion element) --- */
.det-ink-smudge {
    position: absolute;
    width: 30px;
    height: 15px;
    background: rgba(0,0,100,0.08);
    border-radius: 50%;
    filter: blur(3px);
    z-index: 80;
    pointer-events: none;
}

/* --- DIGITAL ANNOTATION STYLE (for digital_corporate cases) --- */
.det-digital-callout {
    position: absolute;
    width: 160px;
    padding: 8px 12px;
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-size: 8pt;
    line-height: 1.4;
    background: rgba(30,144,255,0.1);
    border: 1px solid rgba(30,144,255,0.4);
    border-radius: 4px;
    color: #1a5276;
    z-index: 100;
}

.det-digital-highlight {
    background: rgba(30,144,255,0.15);
    border-bottom: 2px solid rgba(30,144,255,0.5);
    padding: 0 2px;
}

.det-digital-margin {
    position: absolute;
    right: -10px;
    width: 130px;
    padding: 6px 10px;
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-size: 7.5pt;
    line-height: 1.3;
    color: #1a5276;
    border-left: 3px solid #3498db;
    background: rgba(52,152,219,0.05);
    z-index: 90;
}

/* --- POSITIONING HELPERS --- */
.det-pos-top-right { top: 20px; right: 15px; }
.det-pos-top-left { top: 20px; left: 15px; }
.det-pos-bottom-right { bottom: 30px; right: 15px; }
.det-pos-bottom-left { bottom: 30px; left: 15px; }
.det-pos-bottom-margin { bottom: 20px; left: 50%; transform: translateX(-50%); }

/* --- ANNOTATION CONTAINER --- */
.annotation-layer {
    position: relative;
}
.annotation-layer > .det-sticky,
.annotation-layer > .det-margin,
.annotation-layer > .det-question,
.annotation-layer > .det-arrow,
.annotation-layer > .det-digital-callout,
.annotation-layer > .det-digital-margin,
.annotation-layer > .det-coffee-stain,
.annotation-layer > .det-ink-smudge {
    position: absolute;
}
</style>

<script>
/**
 * Detective Annotation Renderer
 * 
 * Called by the Document Assembler after injecting content.
 * Reads annotations from a global `DETECTIVE_ANNOTATIONS` array
 * (set by the Layout Planner from experience_design.json)
 * and renders them as DOM overlays.
 *
 * Usage:
 *   <script>
 *     const DETECTIVE_ANNOTATIONS = [
 *       { type: "sticky_note", content: "Check against B3!", position: "top_right_corner", style_hint: "hasty scrawl", color: "yellow" },
 *       { type: "margin_comment", content: "Why 11:13 but camera gap?", position: "beside_paragraph_3", style_hint: "red ink" },
 *       { type: "highlight", target_text: "02:17:33", color: "yellow" },
 *       { type: "circled_text", target_text: "7741" },
 *       { type: "question_mark", position: "beside_timestamp_2217" }
 *     ];
 *     const EXPERIENTIAL_STYLE = "physical_local"; // or "digital_corporate"
 *   <\/script>
 */

(function() {
    if (typeof DETECTIVE_ANNOTATIONS === 'undefined' || !Array.isArray(DETECTIVE_ANNOTATIONS)) return;
    
    const style = (typeof EXPERIENTIAL_STYLE !== 'undefined') ? EXPERIENTIAL_STYLE : 'physical_local';
    const isDigital = style === 'digital_corporate';
    const body = document.body;
    
    // Make body relative for absolute positioning
    if (getComputedStyle(body).position === 'static') {
        body.style.position = 'relative';
    }
    
    // Random rotation for physical style
    function randRotation(base, range) {
        return base + (Math.random() - 0.5) * range;
    }
    
    // Map position strings to CSS classes or inline styles
    function positionToStyle(pos) {
        const posMap = {
            'top_right_corner': 'det-pos-top-right',
            'top_left_corner': 'det-pos-top-left',
            'bottom_right': 'det-pos-bottom-right',
            'bottom_left': 'det-pos-bottom-left',
            'bottom_margin': 'det-pos-bottom-margin'
        };
        return posMap[pos] || '';
    }
    
    // Color palette for sticky notes
    const stickyColors = ['yellow', 'pink', 'blue', 'green'];
    let colorIndex = 0;
    
    DETECTIVE_ANNOTATIONS.forEach(function(ann, i) {
        switch(ann.type) {
            case 'sticky_note': {
                const note = document.createElement('div');
                const color = ann.color || stickyColors[colorIndex++ % stickyColors.length];
                note.className = isDigital ? 'det-digital-callout' : ('det-sticky ' + color);
                note.textContent = ann.content;
                note.style.setProperty('--rotation', randRotation(-2, 6) + 'deg');
                
                const posClass = positionToStyle(ann.position);
                if (posClass) note.classList.add(posClass);
                else {
                    // Distribute vertically based on index
                    note.style.top = (60 + i * 120) + 'px';
                    note.style.right = (10 + (i % 2) * 20) + 'px';
                }
                
                // Add tape strip for physical style
                if (!isDigital) {
                    const tape = document.createElement('div');
                    tape.className = 'det-tape';
                    tape.style.setProperty('--tape-rotation', randRotation(-5, 10) + 'deg');
                    note.appendChild(tape);
                }
                
                body.appendChild(note);
                break;
            }
            
            case 'margin_comment': {
                const margin = document.createElement('div');
                margin.className = isDigital ? 'det-digital-margin' : 'det-margin';
                if (ann.style_hint === 'hasty scrawl') margin.classList.add('hasty');
                else margin.classList.add('careful');
                margin.textContent = ann.content;
                
                // Position based on paragraph reference
                margin.style.top = (80 + i * 100) + 'px';
                
                body.appendChild(margin);
                break;
            }
            
            case 'highlight': {
                // Find and wrap target text
                if (ann.target_text) {
                    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
                    while (walker.nextNode()) {
                        const node = walker.currentNode;
                        const idx = node.textContent.indexOf(ann.target_text);
                        if (idx >= 0) {
                            const span = document.createElement('span');
                            span.className = isDigital ? 'det-digital-highlight' : ('det-highlight' + (ann.color ? ' ' + ann.color : ''));
                            const range = document.createRange();
                            range.setStart(node, idx);
                            range.setEnd(node, idx + ann.target_text.length);
                            range.surroundContents(span);
                            break; // Only highlight first occurrence
                        }
                    }
                }
                break;
            }
            
            case 'circled_text': {
                if (ann.target_text) {
                    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
                    while (walker.nextNode()) {
                        const node = walker.currentNode;
                        const idx = node.textContent.indexOf(ann.target_text);
                        if (idx >= 0) {
                            const span = document.createElement('span');
                            span.className = 'det-circled';
                            const range = document.createRange();
                            range.setStart(node, idx);
                            range.setEnd(node, idx + ann.target_text.length);
                            range.surroundContents(span);
                            break;
                        }
                    }
                }
                break;
            }
            
            case 'question_mark': {
                const qm = document.createElement('div');
                qm.className = 'det-question';
                qm.textContent = '?';
                qm.style.setProperty('--rotation', randRotation(5, 15) + 'deg');
                qm.style.top = (60 + i * 100) + 'px';
                qm.style.right = '5px';
                body.appendChild(qm);
                break;
            }
            
            case 'arrow_connection': {
                const arrow = document.createElement('div');
                arrow.className = 'det-arrow';
                arrow.style.top = (100 + i * 80) + 'px';
                arrow.style.left = '30px';
                body.appendChild(arrow);
                break;
            }
        }
    });
    
    // Add immersion elements if defined
    if (typeof IMMERSION_ELEMENTS !== 'undefined' && Array.isArray(IMMERSION_ELEMENTS)) {
        IMMERSION_ELEMENTS.forEach(function(elem) {
            switch(elem) {
                case 'coffee_stain_corner': {
                    const stain = document.createElement('div');
                    stain.className = 'det-coffee-stain';
                    stain.style.bottom = '40px';
                    stain.style.right = '30px';
                    body.appendChild(stain);
                    break;
                }
                case 'ink_smudge': {
                    const smudge = document.createElement('div');
                    smudge.className = 'det-ink-smudge';
                    smudge.style.top = (100 + Math.random() * 300) + 'px';
                    smudge.style.left = (20 + Math.random() * 100) + 'px';
                    body.appendChild(smudge);
                    break;
                }
            }
        });
    }
})();
</script>
