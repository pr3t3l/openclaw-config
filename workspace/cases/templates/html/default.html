<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>
    @page { size: Letter; margin: 18mm 18mm 18mm 18mm; }
    body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
           color: #111; background: #f6f2e9; }
    .page { position: relative; }
    .stamp { position: absolute; top: 0; right: 0; border: 2px solid #a00; color:#a00; padding: 6px 10px; transform: rotate(6deg);
             font-weight: 800; letter-spacing: .08em; }
    .header { border-bottom: 2px solid #222; padding-bottom: 10px; margin-bottom: 14px; }
    .case { font-weight: 800; letter-spacing: .06em; }
    .meta { font-size: 12px; opacity: .9; margin-top: 6px; line-height: 1.25; }
    h1 { font-size: 18px; margin: 10px 0 6px; }
    h2 { font-size: 14px; margin: 16px 0 6px; }
    .content { font-size: 12.5px; line-height: 1.35; white-space: pre-wrap; }
    .footer { margin-top: 14px; border-top: 1px solid #333; padding-top: 8px; font-size: 11px; opacity: .85; }
    .small { font-size: 11.5px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="stamp">DECLASSIFIED</div>
    <div class="header">
      <div class="case">CASE {{caseNumber}} — {{caseTitle}}</div>
      <div class="meta">Document: {{docId}} • Envelope: {{envelope}} • Date: {{date}} • Classification: {{classification}}</div>
      <h1>{{title}}</h1>
    </div>
    <div class="content">{{content}}</div>
    <div class="footer">Prepared for training / investigative simulation. All persons depicted are fictional within this case universe.</div>
  </div>
</body>
</html>
