# Copilot Studio — Lessons Learned Register
# Project: Scout Motors Procurement Bot
# Date Range: 2026-04-20 to 2026-04-22
# Author: Alfredo Pretel Vargas

---

# ══════════════════════════════════════════
# SECTION 1: ARCHITECTURE & DESIGN
# ══════════════════════════════════════════

- id: LL-CS-001
  date: 2026-04-20
  category: ARCH
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Adaptive Card placed in a Message node renders buttons but
    Action.Submit clicks do nothing. The bot shows the card,
    user clicks a button, nothing happens — 5 seconds of
    "thinking" then silence.
  immediate_cause: >
    Message nodes are display-only. Action.Submit requires an
    "Ask with Adaptive Card" node to capture the submission
    and populate output variables.
  root_cause: >
    Copilot Studio has two ways to add Adaptive Cards:
    (1) Message node — display only, no interactivity
    (2) Ask with Adaptive Card node — captures input, creates variables
    The UI does not clearly distinguish these. Microsoft docs state:
    "If your Adaptive Card has a Submit button, use an Adaptive Card node,
    not a Message node."
  resolution: >
    Replaced Message node with "Ask with Adaptive Card" node.
    Used Input.ChoiceSet for menu options instead of multiple
    Action.Submit buttons. Added Edit Schema to define output
    variable (userChoice: String). Condition branches route
    based on the captured variable.
  prevention_action: >
    RULE: Any Adaptive Card with Action.Submit MUST use
    "Ask with Adaptive Card" node. Cards in Message nodes
    are for display/informational content only (no Submit buttons).
  keywords:
    - adaptive-card
    - action-submit
    - message-node
    - ask-with-adaptive-card
    - button-not-working

- id: LL-CS-002
  date: 2026-04-20
  category: ARCH
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Quick reply buttons (from Multiple Choice Question nodes)
    only display 3 options in Teams and M365 Copilot, even when
    5 options are configured. Works correctly in Copilot Studio
    test panel.
  immediate_cause: >
    Microsoft Teams and M365 Copilot cap quick reply buttons
    at 3 visible options. This is a platform-level limitation,
    not configurable.
  root_cause: >
    Microsoft Q&A confirms: "Quick replies are capped at 3
    visible options to maintain a clean layout. Currently,
    there isn't a way to increase the quick reply limit."
  resolution: >
    Replaced Multiple Choice Question node with an Adaptive Card
    using Input.ChoiceSet (radio buttons) inside an "Ask with
    Adaptive Card" node. Input.ChoiceSet has no button limit.
    All 5 options render as radio buttons with a single "Go"
    submit button.
  prevention_action: >
    RULE: If you need more than 3 clickable options, use an
    Adaptive Card with Input.ChoiceSet instead of a Multiple
    Choice Question node. Design for Teams limitations first,
    not Studio test panel.
  keywords:
    - quick-replies
    - 3-button-limit
    - teams-limitation
    - input-choiceset
    - adaptive-card

- id: LL-CS-003
  date: 2026-04-20
  category: ARCH
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Adaptive Card JSON in Copilot Studio does not support
    variable substitution. Writing ${Topic.VariableName} in
    the JSON renders as literal text, not the variable value.
  immediate_cause: >
    JSON mode treats all content as static text. Variable
    references are not evaluated.
  root_cause: >
    Copilot Studio Adaptive Cards have two modes:
    (1) JSON card — static, no variable substitution
    (2) Formula (Power Fx) — dynamic, variables evaluated
    You must explicitly switch from JSON to Formula mode in
    the Adaptive Card Node properties panel.
  resolution: >
    In the Adaptive Card node: click three dots (…) → Properties →
    switch from "JSON card" to "Formula". Then use Power Fx syntax:
    Text(Topic.VariableName) to insert dynamic values.
    For URLs with variables, use EncodeUrl(Text(Topic.Variable))
    to properly encode values in mailto: links.
  prevention_action: >
    RULE: Any Adaptive Card that needs to display user-provided
    data (variables from earlier in the conversation) MUST use
    Formula mode, not JSON mode. Switch immediately after pasting
    the initial JSON.
  keywords:
    - adaptive-card
    - variables
    - power-fx
    - formula-mode
    - dynamic-content

- id: LL-CS-004
  date: 2026-04-21
  category: ARCH
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Edit Schema for Adaptive Card output requires a specific
    YAML format. Pasting JSON like {"userChoice": "string"}
    throws a DataType parsing error.
  immediate_cause: >
    The Edit Schema editor expects YAML format, not JSON.
  root_cause: >
    Copilot Studio's schema editor uses YAML internally.
    The default content shows "kind: Record" which hints at
    the expected format but is not clearly documented.
  resolution: >
    Use this exact format in Edit Schema:
    kind: Record
    properties:
      userChoice:
        type: String
  prevention_action: >
    RULE: Edit Schema always uses YAML. Property names must
    match the Input field IDs in the Adaptive Card JSON exactly.
  keywords:
    - edit-schema
    - yaml
    - output-binding
    - adaptive-card

