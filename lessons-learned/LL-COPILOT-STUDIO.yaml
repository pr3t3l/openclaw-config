- id: LL-CS-019
  date: 2026-04-20
  category: PROC
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    YAML topic files cannot be directly imported into Copilot
    Studio. Attempted to paste YAML into the visual editor
    but it doesn't accept it.
  immediate_cause: >
    Copilot Studio uses YAML internally but does not expose
    a YAML import function in the visual editor.
  root_cause: >
    The visual editor is the primary authoring interface.
    YAML export exists (via code editor view) but import of
    externally-written YAML is not supported in the standard UI.
  resolution: >
    Use YAML files as reference documents only. Build topics
    manually in the visual editor, node by node, following
    the YAML as a blueprint. The YAML documents every question,
    condition, message, and redirect in order.
  prevention_action: >
    RULE: YAML files are blueprints, not importable code.
    Always build in the visual editor. Keep YAML as version
    control and reference for rebuilds.
  keywords:
    - yaml
    - import
    - visual-editor
    - reference-document

- id: LL-CS-020
  date: 2026-04-21
  category: PROC
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Procurement team clarified that the process is the same
    for all indirect procurement — not IT-specific. Only 3
    things are IT-only: VW SAM check, MS Budget List, and
    FreshService updates.
  immediate_cause: >
    Initial bot design treated the entire flow as IT-specific,
    with a 4-option purchase type question (Software/Hardware/
    Consulting/Other).
  root_cause: >
    Bot was designed from IT perspective without procurement
    team validation. Assumed more differences between IT and
    non-IT than actually exist.
  resolution: >
    Simplified to a single Boolean: "Is this an IT purchase?"
    IT = Yes → VW SAM check + MS Budget/FreshService reminders
    IT = No → skip those 3 steps, everything else identical.
  prevention_action: >
    RULE: Validate process assumptions with the SME team
    before building. Don't assume complexity that doesn't exist.
    Ask: "What is actually different between these paths?"
  keywords:
    - process-validation
    - sme-feedback
    - simplification
    - it-vs-indirect

- id: LL-CS-021
  date: 2026-04-22
  category: PROC
  system: Knowledge Base
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Knowledge file architecture decision: 3 files vs 15 files.
    Copilot suggested 15 files during initial build.
  immediate_cause: >
    More files = more RAG retrieval boundaries to manage.
    Copilot's 15-file suggestion would fragment related content
    across many small files.
  root_cause: >
    RAG retrieval works best when related content is co-located.
    If a process spans 3 files, the LLM may only retrieve 1-2
    and give an incomplete answer.
  resolution: >
    Used 3 files with clear boundaries:
    01_PROCESS_GUIDE.md — end-to-end process (14 steps)
    02_CONTACTS_AND_RESOURCES.md — all contacts, URLs, templates
    03_THRESHOLDS_AND_RULES.md — category rules, Policy 10
    Each file covers a complete domain. No cross-file dependencies.
  prevention_action: >
    RULE: Fewer, larger knowledge files > many small ones.
    Group by domain (process, contacts, rules) not by step.
    Eliminate internal cross-references between files.
  keywords:
    - knowledge-architecture
    - rag
    - file-structure
    - retrieval-boundaries
