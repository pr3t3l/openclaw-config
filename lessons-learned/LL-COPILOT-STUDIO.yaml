- id: LL-CS-009
  date: 2026-04-20
  category: DATA
  system: Copilot Studio
  severity: CRITICAL
  status: VALIDATED
  problem_statement: >
    LLM hallucinated fake email addresses in bot responses:
    vendormanagement@scoutmotors.com, support@scoutmotors.com,
    finance@scoutmotors.com, itprocurement@scoutmotors.com.
    None of these exist. Users could send emails to addresses
    that go nowhere.
  immediate_cause: >
    When Copilot generates content (from knowledge base or
    when auto-generating topic flows), the LLM invents
    plausible-sounding email addresses that don't exist.
  root_cause: >
    LLMs pattern-match on email formats. "scoutmotors.com"
    + department name = plausible but fake email. The knowledge
    files contained real emails but the LLM also generated
    its own when filling gaps.
  resolution: >
    (1) Audited all topic flows for fake URLs/emails.
    (2) Replaced all fake emails with verified ones.
    (3) Added anti-hallucination instruction to Agent Instructions:
    "NEVER invent or guess email addresses. Only provide email
    addresses that exist in your knowledge files."
  prevention_action: >
    RULE: After every topic creation (especially AI-generated),
    manually verify every URL and email address against source
    documents. Never trust LLM-generated contact information.
    Maintain a verified contacts list in knowledge files.
  keywords:
    - hallucination
    - fake-email
    - data-integrity
    - anti-hallucination

- id: LL-CS-010
  date: 2026-04-20
  category: DATA
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Knowledge files contained Ivalua UI references ("orange box",
    "workflow tab", "green = done") that are meaningless to
    users who have never seen Ivalua's interface.
  immediate_cause: >
    Knowledge files were written from a power-user perspective,
    not an end-user perspective.
  root_cause: >
    Source documents (Confluence, meeting notes) used internal
    jargon because they were written for the procurement team,
    not for general users.
  resolution: >
    Replaced all UI-specific references with plain language:
    "orange box" → "ask the vendor if they clicked Submit"
    "workflow tab" → removed entirely
    "GREEN = done" → "once all validations are complete,
    the supplier becomes active"
    Defined every acronym on first use (ITBP, PKI, P2P, KMDG,
    SAQ, LEMI, SOR, PoA, IPA).
  prevention_action: >
    RULE: Knowledge files must be written for a person who has
    never used the system. No UI element references. No undefined
    acronyms. Every term defined on first use. Test by asking:
    "Would a new hire on their first day understand this?"
  keywords:
    - jargon
    - plain-language
    - acronyms
    - user-level-writing

- id: LL-CS-011
  date: 2026-04-21
  category: DATA
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    LLM could not answer "How do I fill out a PR?" even though
    the knowledge file mentioned PR creation. Bot fell back to
    generic catch-all response.
  immediate_cause: >
    Knowledge file said "Create a Purchase Requisition following
    the training guide (7.3.5)" — a reference to an external
    document, not actual instructions. The LLM had no content
    to synthesize an answer from.
  root_cause: >
    Knowledge files contained pointers to external documentation
    instead of actual content. The LLM cannot follow external
    references — it can only answer from what's in the files.
  resolution: >
    (1) Added Ivalua Training Documentation URL to knowledge file
    with section-by-section guide mapping.
    (2) Added Agent Instructions to reference specific training
    sections (7.3 for PRs, 9.1.1 for Goods Receipt).
    (3) Long-term: convert the 32 Ivalua training PDFs to
    markdown and upload as knowledge sources.
  prevention_action: >
    RULE: Knowledge files must contain actual answers, not
    references to external documents. If the full content can't
    be included, at minimum include: (1) the URL to the external
    resource, (2) a summary of key steps, (3) the most common
    fields/actions the user needs.
  keywords:
    - knowledge-gap
    - external-reference
    - training-documentation
    - llm-cannot-follow-links

