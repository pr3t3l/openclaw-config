- id: LL-CS-005
  date: 2026-04-20
  category: DESIGN
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Topic with "The agent chooses" trigger was being bypassed.
    User typed "I need to add a new vendor" but the knowledge
    base answered instead of the Onboard New Vendor topic.
    The LLM dumped all process steps at once instead of
    step-by-step guided flow.
  immediate_cause: >
    The topic was turned off (disabled). Also, when topic
    descriptions are weak, the agent's AI prefers the knowledge
    base for complex questions.
  root_cause: >
    Two factors: (1) The topic was disabled in the Topics list.
    (2) Even when enabled, "The agent chooses" routing depends
    on the trigger description quality. Vague descriptions lose
    to knowledge base responses.
  resolution: >
    Turned the topic on. Updated the trigger description to be
    aggressive and specific with many trigger phrases:
    "This topic handles ANY question about adding, onboarding,
    registering, or setting up a new vendor or supplier..."
    Listed 15+ variations.
  prevention_action: >
    RULE: (1) Always verify topics are enabled before testing.
    (2) For "The agent chooses" triggers, make descriptions
    extremely specific about what the topic handles AND what it
    does NOT handle. Include 10-15 trigger phrase variations.
    (3) Make topic descriptions compete aggressively — weak
    descriptions lose to the knowledge base.
  keywords:
    - topic-routing
    - agent-chooses
    - trigger-description
    - knowledge-base-override

- id: LL-CS-006
  date: 2026-04-21
  category: DESIGN
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Greeting topic set to "A message is received" trigger
    intercepted ALL messages, including starter prompts like
    "I need to onboard a new vendor." Every message showed the
    greeting menu instead of routing to the correct topic.
  immediate_cause: >
    "A message is received" fires on every single message —
    it has the highest priority and catches everything before
    other topics can match.
  root_cause: >
    Copilot Studio trigger types have an implicit priority:
    "A message is received" > "Phrases" > "The agent chooses"
    Using the highest-priority trigger on a greeting topic
    blocks all other topics from firing.
  resolution: >
    Changed Greeting topic trigger back to "The agent chooses"
    with a very restrictive description: "This topic ONLY handles
    greeting messages... Do NOT use this topic for any question
    about vendors, procurement, onboarding..."
  prevention_action: >
    RULE: Never use "A message is received" for content topics.
    Reserve it only for system-level catch-all topics (like
    error handling). For greetings, use "The agent chooses"
    with a restrictive description that explicitly excludes
    business topics.
  keywords:
    - trigger-type
    - message-received
    - routing-conflict
    - greeting-topic

- id: LL-CS-007
  date: 2026-04-20
  category: DESIGN
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Copilot Studio visual editor only flows downward.
    Cannot loop back to a previous question node in the
    same flow. "No" answers create dead ends.
  immediate_cause: >
    The visual editor does not support upward connections.
  root_cause: >
    Copilot Studio uses a directed acyclic graph (DAG) for
    topic flows — by design, no backward connections.
  resolution: >
    Use GotoAction nodes to redirect back to any previous
    node by referencing its action ID. In YAML:
    - kind: GotoAction
      actionId: Question_Step1
    In the visual editor: add a node → Topic management →
    "Go to step" → select the target question node.
  prevention_action: >
    RULE: For any "No" or "try again" branch, use GotoAction
    to loop back to the same question. Never use EndDialog
    unless the user explicitly chooses to leave.
  keywords:
    - goto-action
    - loop
    - no-branch
    - dead-end

- id: LL-CS-008
  date: 2026-04-20
  category: DESIGN
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Using Boolean (Yes/No) for diagnostic questions is too
    limiting. Users often don't know the answer — they need
    a third option like "I'm not sure" or "What is this?"
  immediate_cause: >
    BooleanPrebuiltEntity only supports Yes/No. No third option.
  root_cause: >
    Boolean is appropriate for simple confirmations but not for
    diagnostic flows where the user may lack context.
  resolution: >
    Replaced BooleanPrebuiltEntity with ClosedListEntity
    (Multiple Choice) with 3 options: Yes / No / I am not sure
    (or contextual alternatives like "What is this?",
    "How do I check?", "They are having trouble").
  prevention_action: >
    RULE: Use Boolean only for simple Yes/No confirmations.
    For any diagnostic or decision question, use Multiple Choice
    with a "help" option that provides context before looping back.
  keywords:
    - boolean
    - multiple-choice
    - closed-list
    - third-option

