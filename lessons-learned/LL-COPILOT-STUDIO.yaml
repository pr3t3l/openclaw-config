- id: LL-CS-015
  date: 2026-04-20
  category: SEC
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Team repeatedly asked to confirm the bot was not publicly
    accessible. The Share dialog shows "Everyone in organization"
    as an option which caused concern.
  immediate_cause: >
    The Share dialog always shows "Everyone in organization"
    as an available option under "My organization" — even when
    it is not enabled. This creates confusion about whether
    the bot is public.
  root_cause: >
    UI design issue in Copilot Studio. "Everyone in organization"
    is listed as a selectable option, not just when it's active.
    New users can't tell if it's enabled or just available.
  resolution: >
    Confirmed access list shows only 3 users:
    Alfredo (Owner), Michael (Viewer), Srridewi (Viewer).
    "Everyone in organization" is NOT added — it's just listed
    as an option. Screenshot the Share dialog as audit trail.
  prevention_action: >
    RULE: Before every publish, check the Share dialog and
    confirm the exact user list. Screenshot it. Only Owner
    and explicitly added Viewers/Editors have access.
    "Everyone in organization" must be explicitly added to
    grant org-wide access — it's not on by default.
  keywords:
    - sharing
    - privacy
    - access-control
    - audit-trail

