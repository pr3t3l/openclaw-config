- id: LL-CS-012
  date: 2026-04-21
  category: DEPLOY
  system: Copilot Studio
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    After publishing updates in Copilot Studio, changes did not
    appear in Teams or M365 Copilot. Old flow continued to run.
    Bot icon update also did not propagate.
  immediate_cause: >
    Teams and M365 Copilot cache bot metadata and conversation
    state aggressively. Old sessions continue using the
    previous published version.
  root_cause: >
    Copilot Studio preserves existing sessions after publishing.
    The agent only picks up the new version once the dialog
    stack is empty or a new conversation starts.
  resolution: >
    (1) Re-publish with "Force newest version" checkbox checked.
    (2) Users must delete old chat with the bot and start a
    new conversation.
    (3) Wait 15-30 minutes for full propagation.
  prevention_action: >
    RULE: After every publish:
    (1) Check "Force newest version" if topics changed.
    (2) Tell testers to start a NEW conversation (not continue old).
    (3) Allow 15-30 minutes for Teams/M365 propagation.
    (4) Test in Copilot Studio test panel first (instant updates).
  keywords:
    - publishing
    - cache
    - propagation
    - force-newest-version
    - teams-delay

- id: LL-CS-013
  date: 2026-04-20
  category: DEPLOY
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Bot published to Teams channel but does not respond to
    messages in Teams. Works in Copilot Studio and M365 Copilot.
  immediate_cause: >
    Teams channel provisioning can take 10-15 minutes.
    Additionally, a yellow banner warning about premium
    features/licensing may throttle the Teams channel.
  root_cause: >
    Teams channel requires separate provisioning after
    publishing. The M365 Copilot channel and Studio test
    panel use different infrastructure that provisions faster.
  resolution: >
    (1) Wait 15 minutes after enabling Teams channel.
    (2) Delete and restart the chat in Teams.
    (3) Access bot via "See agent in Teams" link from
    Copilot Studio Channels page.
    (4) If Teams continues to fail, use M365 Copilot channel
    as primary — it works reliably.
  prevention_action: >
    RULE: Always test in M365 Copilot first (more reliable).
    Teams channel is secondary. If Teams doesn't respond
    after 30 minutes, check licensing warnings and channel
    provisioning status.
  keywords:
    - teams-channel
    - not-responding
    - provisioning
    - m365-copilot

- id: LL-CS-014
  date: 2026-04-20
  category: DEPLOY
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Copilot Studio agents don't appear in the M365 Copilot
    Agent Store search. Users cannot find the bot by searching.
  immediate_cause: >
    Copilot Studio agents published with private sharing
    (specific viewers) are not indexed in the Agent Store.
    Only org-wide published agents appear in search.
  root_cause: >
    Agent Store is for org-wide discovery. Privately shared
    agents are accessed by direct link only.
  resolution: >
    Share the direct link with users via Teams message.
    Get the link from: Copilot Studio → three dots → Copy link.
    Or: Channels → Microsoft 365 and Teams → "See agent in
    Microsoft 365" / "See agent in Teams".
  prevention_action: >
    RULE: For privately shared bots, always provide a direct
    link. Don't tell users to "search for it" — they won't
    find it. Include the link in the onboarding message.
  keywords:
    - agent-store
    - direct-link
    - private-sharing
    - discovery

