- id: LL-CS-016
  date: 2026-04-22
  category: PLATFORM
  system: Copilot Studio / Teams
  severity: MEDIUM
  status: KNOWN_LIMITATION
  problem_statement: >
    URLs in bot messages appear as plain text, not clickable
    hyperlinks, in Teams and M365 Copilot.
  immediate_cause: >
    "Plain text URLs are not rendered as clickable links in
    Teams Copilot. There is currently no supported workaround."
    — Microsoft Q&A, confirmed as known limitation.
  root_cause: >
    Teams Copilot strips or sanitizes URLs for security reasons.
    Copilot Studio test panel renders them correctly, but
    Teams and M365 Copilot do not.
  resolution: >
    Partial fix: Use markdown link format [display text](URL)
    in Message nodes. This works in some channels but not all.
    Angle bracket format <URL> also works in some cases.
    For critical links, use Adaptive Card with Action.OpenUrl
    button — this always renders as clickable.
  prevention_action: >
    RULE: For critical URLs that users MUST click, use an
    Adaptive Card with Action.OpenUrl. For informational URLs,
    use markdown format and accept that some channels may
    render them as plain text.
  keywords:
    - urls
    - hyperlinks
    - plain-text
    - teams-limitation
    - action-openurl

- id: LL-CS-017
  date: 2026-04-21
  category: PLATFORM
  system: Copilot Studio
  severity: LOW
  status: KNOWN_LIMITATION
  problem_statement: >
    Starter prompts on the M365 Copilot landing page only
    show 3 cards. Additional prompts are hidden behind
    "Browse more prompts" link.
  immediate_cause: >
    M365 Copilot UI displays maximum 3 starter prompt cards
    on the landing page. This is a fixed UI layout.
  root_cause: >
    Platform design decision. Not configurable.
  resolution: >
    Put the 3 most important starter prompts first in the list.
    Users can click "Browse more prompts" for the rest.
    The Adaptive Card greeting menu (inside the conversation)
    shows all 5 options regardless.
  prevention_action: >
    RULE: Prioritize your top 3 starter prompts. Don't rely
    on starter prompts as the only entry point — always have
    the Greeting topic as backup with all options.
  keywords:
    - starter-prompts
    - landing-page
    - 3-card-limit

