- id: LL-CS-018
  date: 2026-04-22
  category: TECH
  system: Copilot Studio
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Adaptive Card with Action.OpenUrl needs to include dynamic
    variable values in a mailto: URL. Standard JSON string
    concatenation doesn't work.
  immediate_cause: >
    JSON mode does not evaluate expressions. The URL must be
    built using Power Fx string concatenation in Formula mode.
  root_cause: >
    mailto: URLs require URL-encoded values. Variable content
    with spaces, special characters, or ampersands will break
    the URL if not encoded.
  resolution: >
    Switch to Formula mode. Use Power Fx:
    url: "mailto:vendor@scoutmotors.com?subject=" &
    EncodeUrl(Text(Topic.SupplierLegalName)) & "&body=" &
    EncodeUrl(Text(Topic.DUNSNumber))
    EncodeUrl() handles special characters.
    Text() converts non-string variables to strings.
  prevention_action: >
    RULE: Any Adaptive Card with dynamic URLs must use
    Formula mode + EncodeUrl() for all variable insertions.
    Test with values containing spaces and special characters.
  keywords:
    - power-fx
    - mailto
    - encodeurl
    - formula-mode
    - dynamic-url

