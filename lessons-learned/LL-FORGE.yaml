- id: LL-N8N-094
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: CRITICAL
  status: VALIDATED
  problem_statement: >
    Code nodes using n8n {{ }} template syntax inside JavaScript produce
    literal strings instead of evaluated values. SerpAPI queries in Phases
    2, 3, 7 sent "{{ $json.config.category.primary }} market size 2026"
    as the actual query text.
  immediate_cause: >
    {{ }} is n8n expression syntax for Set/IF/PostgreSQL parameter fields.
    Inside Code nodes (jsCode), it is treated as a plain string — n8n does
    NOT evaluate expressions inside JavaScript code blocks.
  root_cause: >
    Confusion between two n8n interpolation contexts: parameter fields
    (where {{ }} works) vs Code node JavaScript (where it doesn't).
  failed_attempts:
    - "Assumed {{ }} would be pre-processed before Code execution"
  solution: >
    Use JavaScript template literals with variables from upstream nodes.
    Access data via $('NodeName').first().json or $input.first().json,
    store in JS variables, then use `${variable}` interpolation.
    Example: const name = pt.config.product_name; const q = `${name} market trends`;
  prevention_action: >
    RULE: Never use {{ }} inside jsCode. Always use JS template literals
    with upstream node references. Review all Code nodes for {{ }} before
    deploying.
  keywords:
    - n8n
    - Code node
    - template syntax
    - expression
    - interpolation
    - SerpAPI
    - BuildQueries

- id: LL-N8N-095
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Cost logger returns $0.00 for all LLM calls. Token counts are always 0.
  immediate_cause: >
    CostLog reads llm.usage.prompt_tokens (API format) but n8n LLM Chain
    nodes (chainLlm) expose tokens via tokenUsage.promptTokens (camelCase).
  root_cause: >
    n8n's LangChain abstraction (chainLlm v1.9) wraps the raw API response.
    The raw usage fields (prompt_tokens, completion_tokens) are transformed
    into tokenUsage (promptTokens, completionTokens, totalTokens) at the
    n8n node level. The original API fields are not passed through.
  failed_attempts:
    - "Reading llm.usage.prompt_tokens — always undefined"
    - "Reading llm.usageMetadata — also undefined (Gemini format)"
  solution: >
    Check tokenUsage first (n8n format), then fall back to API formats:
    const tu = llm.tokenUsage || {};
    const u = llm.usage || llm.usageMetadata || {};
    const ti = tu.promptTokens || u.prompt_tokens || u.input_tokens || u.promptTokenCount || 0;
  prevention_action: >
    RULE: When reading LLM output from n8n LangChain nodes, always check
    tokenUsage (camelCase) first. Add _debug_source field to identify which
    format was found.
  keywords:
    - n8n
    - cost logger
    - tokenUsage
    - LLM Chain
    - chainLlm
    - prompt_tokens
    - promptTokens

- id: LL-N8N-096
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    SplitInBatches "done" output may not contain HTTP Response data.
    AggSnippets nodes using $input.all() received PG INSERT results
    instead of SerpAPI search results, causing Research Data: [].
  immediate_cause: >
    The SplitInBatches loop path is: SplitBatch -> Search (HTTP) ->
    SearchCost (PG INSERT) -> Wait -> SplitBatch. The "done" output
    accumulates items from the loop-back path, where the last data-
    producing node is SearchCost (PG), not Search (HTTP).
  root_cause: >
    $input.all() in the "done" branch receives whatever the SplitInBatches
    node accumulated. In n8n, this is the data from the loop-back
    connection, which gets overwritten by intermediate PG nodes (LL-N8N-066).
  failed_attempts:
    - "$('P2_Search').all() in AggSnippets — fails with 'Node P2_Search
      hasn't been executed' because loop-internal nodes are not accessible
      by named reference from the done branch outside the loop"
  solution: >
    Move PG nodes (SearchCost) OUT of the SplitInBatches loop entirely.
    Clean loop: SplitBatch -> Search(HTTP) -> Wait -> SplitBatch.
    SearchCost runs AFTER the loop: AggSnippets -> SearchCost -> LLM.
    Now $input.all() in AggSnippets receives HTTP responses directly.
  prevention_action: >
    RULE: SplitInBatches loop must contain ONLY nodes whose output you
    want accumulated. Any PG/side-effect node must go AFTER the loop.
    Named refs $('NodeName') do NOT work for nodes inside the loop
    when called from outside the loop (done branch).
  keywords:
    - n8n
    - SplitInBatches
    - done output
    - $input.all
    - named reference
    - AggSnippets
    - search results

- id: LL-N8N-097
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: CRITICAL
  status: VALIDATED
  problem_statement: >
    ExecuteWorkflow node (v1.2) fails with "No information about the
    workflow to execute found" even when workflowId is set correctly
    as a plain string.
  immediate_cause: >
    n8n ExecuteWorkflow v1.2+ expects workflowId as a resource locator
    object: {"__rl": true, "mode": "id", "value": "PzBvnQAwmi52e6bs"}.
    When given a plain string, the code does
    const { value } = getNodeParameter('workflowId') which destructures
    a string and gets value = undefined.
  root_cause: >
    n8n changed the workflowId parameter format between v1.0 and v1.1.
    v1.0 accepts a plain string. v1.1+ requires a resource locator object.
    The source code explicitly branches:
    if (nodeVersion === 1) { id = getNodeParameter('workflowId') }
    else { const { value } = getNodeParameter('workflowId', i, {}); id = value }
  failed_attempts:
    - "Adding source: database to the params — same error"
    - "Direct DB UPDATE of source field — did not help"
    - "n8n import:workflow CLI — strips source field entirely"
  solution: >
    Set workflowId as resource locator object in the JSON:
    "workflowId": {"__rl": true, "mode": "id", "value": "THE_WORKFLOW_ID"}
    Push to n8n via direct DB UPDATE of workflow_entity.nodes, then restart.
  prevention_action: >
    RULE: For executeWorkflow nodes with typeVersion >= 1.1, ALWAYS use
    resource locator format for workflowId. Never use plain string IDs.
    When migrating workflows, verify this format before importing.
  keywords:
    - n8n
    - executeWorkflow
    - workflowId
    - resource locator
    - __rl
    - sub-workflow
    - typeVersion

- id: LL-N8N-098
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    n8n import:workflow CLI strips and reformats node parameters.
    Specifically: removes "source" field from executeWorkflow nodes,
    adds empty "workflowInputs" object, reformats node positions.
  immediate_cause: >
    The CLI import validates and normalizes node parameters against the
    current node schema. Fields not in the schema are dropped. Fields
    with defaults are injected.
  root_cause: >
    n8n import:workflow is designed for portability between instances,
    so it normalizes everything. It is NOT a lossless round-trip tool.
  failed_attempts:
    - "import:workflow --input=file.json — worked but corrupted params"
    - "Re-adding source:database via DB UPDATE after import — n8n still
      failed because workflowId format was also wrong"
  solution: >
    Do NOT use n8n import:workflow CLI for updating existing workflows.
    Instead, UPDATE workflow_entity.nodes and workflow_entity.connections
    directly in the n8n PostgreSQL database (database: n8n), then
    docker restart platform_n8n.
  prevention_action: >
    RULE: To push workflow changes to n8n programmatically:
    1. Generate SQL: UPDATE workflow_entity SET nodes='...'::jsonb,
       connections='...'::jsonb WHERE id='WORKFLOW_ID';
    2. Execute via: docker exec -i platform_postgres psql -U platform -d n8n < file.sql
    3. Restart: docker restart platform_n8n
    Never use n8n import:workflow CLI for existing workflows.
  keywords:
    - n8n
    - import workflow
    - CLI
    - parameter stripping
    - DB update
    - migration
    - deploy

- id: LL-N8N-099
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Sub-workflow set to active=true via direct DB UPDATE still fails
    with "Workflow is not active and cannot be executed" after restart.
  immediate_cause: >
    Setting active=true in workflow_entity is not enough. n8n has an
    internal activation mechanism that registers the workflow in its
    runtime service.
  root_cause: >
    n8n's activation is a two-step process: DB flag + runtime registration.
    Direct DB UPDATE only does step 1. The n8n CLI or API must be used
    for step 2.
  failed_attempts:
    - "UPDATE workflow_entity SET active = true — flag set but n8n ignores it"
    - "docker restart after DB UPDATE — still not recognized as active"
  solution: >
    Use the n8n CLI to activate sub-workflows:
    docker exec platform_n8n n8n update:workflow --id=WORKFLOW_ID --active=true
    Then restart: docker restart platform_n8n
    Both steps are required — CLI sets internal state, restart loads it.
  prevention_action: >
    RULE: Always use the deploy script (scripts/deploy_n8n.sh) which
    does DB UPDATE + CLI activation + restart in the correct order.
    Never set active=true via raw SQL alone.
  keywords:
    - n8n
    - sub-workflow
    - active
    - publish
    - CLI activation
    - deploy

- id: LL-N8N-100
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: CRITICAL
  status: VALIDATED
  problem_statement: >
    After moving SearchCost outside the SplitInBatches loop and placing
    it between AggSnippets and LLM_Chain, LLM_Chain fails with
    "No prompt specified — expected chatInput".
  immediate_cause: >
    SearchCost is a PostgreSQL executeQuery node. Per LL-N8N-066, it
    replaces $json with its own output (empty INSERT result). LLM_Chain
    receives {} instead of {chatInput: "..."} from AggSnippets.
  root_cause: >
    Same LL-N8N-066 pattern, but in a new location. Any PG node in the
    serial path between a data-producing Code node and its consumer
    will eat the data. This is the THIRD time this pattern caused a bug
    in this workflow (Insert Run, SplitBatch loop, AggSnippets chain).
  failed_attempts:
    - "AggSnippets -> SearchCost(PG) -> LLM_Chain — PG eats chatInput"
  solution: >
    Make SearchCost a PARALLEL branch from AggSnippets, not serial.
    AggSnippets outputs to both LLM_Chain AND SearchCost simultaneously.
    SearchCost is a dead-end (no downstream connection needed).
    In n8n connections JSON: one output array with two targets.
  prevention_action: >
    RULE: PG side-effect nodes (INSERT for logging, UPDATE for status)
    must NEVER be in the serial data path. Always branch them in parallel.
    Pattern: DataNode -> [ConsumerNode, LoggingPG] (parallel output).
    Audit checklist: for every PG node, verify its downstream node does
    NOT depend on $json from the node BEFORE the PG node.

- id: LL-N8N-101
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: CRITICAL
  status: VALIDATED
  problem_statement: >
    Claude Sonnet 4.5 phases (3, 4, 8) stored data={} (2 chars) in
    phase_artifacts. Warnings showed "Not valid JSON: Unexpected token
    backtick" — the Validator failed to parse Claude's response.
  immediate_cause: >
    Claude wraps JSON output in markdown fences (```json...```). The
    Validator's regex /```(?:json)?\s*([\s\S]*?)```/ failed to match
    in n8n's Code node sandbox, causing JSON.parse to receive the full
    fenced string and fail. The workflow continued with data={} instead
    of halting because there was no IF gate checking valid===false.
  root_cause: >
    Two issues: (1) Regex-based fence stripping is fragile in n8n's
    V8 sandbox — possible BOM, zero-width chars, or sandbox-specific
    regex behavior. (2) Validator sets valid=false but Envelope node
    continues regardless, saving empty data to PostgreSQL.
  failed_attempts:
    - Regex fence-stripping pattern works in Python/Node but fails
      in n8n Code node sandbox for unknown reason
  solution: >
    Replaced regex with indexOf-based extraction:
    1. Find first ``` and extract content between next newline and last ```
    2. Fallback: find first { and last } in the string
    Also added first-100-chars to error message for debugging.
  prevention_action: >
    RULE: Never rely on regex for markdown fence stripping in n8n Code
    nodes. Use indexOf/substring approach. Also: add IF gate after
    Validator to halt on valid===false instead of saving empty artifacts.
  keywords:
    - n8n
    - Claude
    - markdown fences
    - JSON parsing
    - regex
    - Validator
    - Code node sandbox

- id: LL-N8N-102
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: CRITICAL
  status: VALIDATED
  problem_statement: >
    Claude Sonnet 4.5 phases (3, 4, 8) produced truncated JSON output
    (2 chars = empty object) because default max_tokens was too low
    for 7KB+ JSON responses.
  immediate_cause: >
    n8n Anthropic LLM node (lmChatAnthropic v1.3) with "options": {}
    uses a low default max_tokens. Claude's structured JSON output for
    complex phases (buyer personas, strategy integration) requires
    7,000-10,000+ tokens. Output gets silently truncated mid-JSON,
    causing parse failure in the Validator.
  root_cause: >
    Unlike OpenAI which defaults to a generous max_tokens, Anthropic's
    API has a conservative default. The n8n node does not override this
    unless explicitly configured via options.maxTokensToSample.
  solution: >
    Set maxTokensToSample explicitly on all Anthropic LLM nodes:
    "options": { "maxTokensToSample": 8192 }
    For OpenAI nodes, use "options": { "maxTokens": 8192 }
  prevention_action: >
    RULE: Every LLM node in the workflow MUST have explicit max tokens
    set. Never rely on provider defaults. Anthropic uses
    maxTokensToSample, OpenAI uses maxTokens. Check all LLM_Model
    nodes before deploying.
  keywords:
    - n8n
    - Claude
    - Anthropic
    - max_tokens
    - maxTokensToSample
    - truncation
    - JSON output

- id: LL-N8N-103
  date: 2026-04-14
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    deploy_n8n.sh overwrites manual changes made in n8n UI. User changed
    P8_LLM_Model to different models in the UI, but running the deploy
    script reverted it to the version in the local JSON file.
  immediate_cause: >
    The deploy script does a full UPDATE of workflow_entity.nodes from
    the local JSON, replacing ALL nodes including ones the user modified
    via the n8n editor UI.
  root_cause: >
    One-directional sync: local JSON -> n8n DB. No mechanism to merge
    UI changes back to local JSON before deploying.
  solution: >
    Before running deploy, export current state from n8n first:
    docker exec platform_n8n n8n export:workflow --id=ID --output=file
    Then merge changes manually or use the exported version as base.
    For quick model changes, update directly in DB via SQL instead of
    full deploy.
  prevention_action: >
    RULE: If you made changes in the n8n UI, either (1) export the
    workflow and update the local JSON to match, or (2) make the same
    changes in the local JSON before running deploy. The deploy script
    is a FULL REPLACE, not a merge.
  keywords:
    - n8n
    - deploy
    - UI changes
    - overwrite
    - sync
    - export

