- id: LL-DATA-053
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Run ID collision possible if two runs start in the same second.
  immediate_cause: >
    Date-based IDs (PI-YYYYMMDD-NNN) without sequence.
  root_cause: >
    No atomic counter for the numeric suffix.
  solution: >
    Use PostgreSQL sequence (run_sequence) for the numeric suffix.
    Format: PI-YYYYMMDD-NNNN where NNNN comes from nextval().
  prevention_action: >
    CREATE SEQUENCE run_sequence in migration script.
  keywords:
    - run_id
    - collision
    - sequence
    - PostgreSQL

- id: LL-DATA-054
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    G2 feedback overwrites G1 feedback in a single TEXT column.
  immediate_cause: >
    workflow_runs.human_feedback was TEXT, not JSONB.
  root_cause: >
    Design assumed only one gate.
  solution: >
    Use JSONB column: {g1: "...", g2: "..."}. Each gate writes to its
    own key using jsonb_set().
  prevention_action: >
    human_feedback JSONB DEFAULT '{}' in CREATE TABLE.
  keywords:
    - human feedback
    - gates
    - JSONB
    - G1
    - G2

- id: LL-DATA-055
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    After a failure, resume doesn't know which phase was being attempted
    — only the last completed phase.
  immediate_cause: >
    current_phase was updated after completion, not at start.
  root_cause: >
    Update timing convention not specified.
  solution: >
    current_phase must be updated at the START of a phase, not after
    completion.
  prevention_action: >
    P*_UpdatePhase nodes run BEFORE the LLM call, not after.
  keywords:
    - resume
    - failure recovery
    - current_phase
    - workflow_runs

- id: LL-DATA-056
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Cost SUM queries for 'llm' silently undercount by up to 30% because
    retries are logged as separate call_type 'retry'.
  immediate_cause: >
    call_type enum included 'retry' as a separate value.
  root_cause: >
    A retry IS an LLM call — it shouldn't be a different type.
  solution: >
    call_type enum only has 'llm' and 'search'. Retries tracked via
    is_retry boolean column.
  prevention_action: >
    CHECK constraint: call_type IN ('llm', 'search').
  keywords:
    - cost tracking
    - retry
    - call_type
    - undercounting

- id: LL-DATA-057
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Confidence dashboard and generic warnings have nowhere to be stored
    — they're not part of Phase 8's LLM output (data column).
  immediate_cause: >
    No metadata column on phase_artifacts.
  root_cause: >
    Post-phase deterministic outputs weren't anticipated in schema.
  solution: >
    Add metadata JSONB column to phase_artifacts. Confidence report and
    generic warnings stored there, separate from LLM data.
  prevention_action: >
    metadata JSONB NOT NULL DEFAULT '{}' in CREATE TABLE.
  keywords:
    - metadata
    - confidence dashboard
    - generic detector
    - schema

- id: LL-DATA-058
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: LOW
  status: VALIDATED
  problem_statement: >
    "Get latest intelligence" query mixes rows from different runs.
  immediate_cause: >
    Naive ORDER BY created_at DESC LIMIT 8 doesn't isolate run.
  root_cause: >
    No CTE to identify the latest run first.
  solution: >
    Use CTE to isolate latest completed run_id, then JOIN artifacts.
  prevention_action: >
    Query pattern documented in DATA_MODEL §8.
  keywords:
    - query
    - CTE
    - latest run
    - mixed rows

- id: LL-DATA-059
  date: 2026-04-08
  category: DATA
  system: Forge/PostgreSQL
  severity: LOW
  status: VALIDATED
  problem_statement: >
    gen_random_uuid() fails on PostgreSQL < 13 without pgcrypto.
  immediate_cause: >
    Migration script didn't include CREATE EXTENSION.
  root_cause: >
    Default assumption about PostgreSQL version.
  solution: >
    Migration scripts must include CREATE EXTENSION IF NOT EXISTS pgcrypto
    before any table that uses gen_random_uuid().
  prevention_action: >
    First line of migrate_forge.sql is CREATE EXTENSION.
  keywords:
    - pgcrypto
    - UUID
    - migration
    - PostgreSQL

