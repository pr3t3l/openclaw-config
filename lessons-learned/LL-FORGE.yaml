- id: LL-QUAL-034
  date: 2026-04-08
  category: QUAL
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    LLM output missing evidence sources — claims without backing.
  immediate_cause: >
    Prompt didn't explicitly require source fields.
  root_cause: >
    Quality is designed in the spec, not QA'd afterward. If the schema
    doesn't require a source field, facts will be unsourced.
  solution: >
    verified_facts item schema requires source + source_type +
    date_verified. Structural validator enforces non-empty arrays for
    research phases.
  prevention_action: >
    Schema defined in WORKFLOW_SPEC §3, enforced by Validator Code node.
  keywords:
    - quality
    - verified_facts
    - evidence
    - schema validation

- id: LL-QUAL-049
  date: 2026-04-08
  category: QUAL
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Validator rejecting phases 1,4,5,6 for empty verified_facts when
    those phases legitimately have no web research.
  immediate_cause: >
    Validator applied same rule to all phases.
  root_cause: >
    No distinction between research and non-research phases.
  solution: >
    Phases without web research (1,4,5,6) produce empty verified_facts[]
    — that is expected. Phases WITH web research (2,3,7) MUST produce
    non-empty verified_facts[]. Validator uses is_research_phase flag.
  prevention_action: >
    PrepFinalize sets is_research_phase=true for phases 2,3,7 only.
  keywords:
    - validation
    - verified_facts
    - research phases
    - false positive

- id: LL-QUAL-050
  date: 2026-04-08
  category: QUAL
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Anti-persona in Phase 3 was invented without evidence — just a
    plausible-sounding non-buyer profile.
  immediate_cause: >
    Prompt requested anti-persona but didn't require evidence.
  root_cause: >
    Same validation rules as regular personas must apply to anti-persona.
  solution: >
    Anti-persona requires non-empty rejection_evidence +
    ad_exclusion_keywords + signals. Validator checks all three.
  prevention_action: >
    Phase 3 validator checks anti_persona.rejection_evidence is non-empty.
  keywords:
    - anti-persona
    - Phase 3
    - evidence
    - validation

- id: LL-QUAL-051
  date: 2026-04-08
  category: QUAL
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Phase 8 strategy output contained generic marketing phrases that
    add no product-specific value.
  immediate_cause: >
    LLM defaults to business-speak when synthesizing across many inputs.
  root_cause: >
    No detection mechanism for lazy output.
  solution: >
