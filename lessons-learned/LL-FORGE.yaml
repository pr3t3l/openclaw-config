- id: LL-N8N-074
  date: 2026-04-09
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    n8n workflow JSON has invalid syntax — triple braces {{{ }}} in SQL
    query fields.
  timeline:
    - "2026-04-09: P1_UpdatePhase fails with 'invalid syntax'"
    - "2026-04-09: Root cause: Python f-strings produced triple braces"
    - "2026-04-09: 36 replacements made across workflow JSON"
  immediate_cause: >
    Python f-strings with 6 braces ({{{{{{) produce 3 literal braces.
  root_cause: >
    Python f-string brace escaping is unintuitive: {{ = literal {,
    so {{{{ = literal {{, but {{{{{{ = literal {{{ which is invalid n8n.
  solution: >
    Use 4 braces ({{{{) in Python f-strings to produce 2 literal braces
    ({{ }}) which is valid n8n expression syntax.
  prevention_action: >
    generate_workflow.py sql_phase() function uses 4 braces.
  keywords:
    - n8n
    - triple braces
    - Python f-strings
    - expression syntax
    - generate_workflow.py

