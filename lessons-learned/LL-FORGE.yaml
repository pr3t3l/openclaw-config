- id: LL-N8N-064
  date: 2026-04-09
  category: N8N
  system: Forge/Docker/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    All n8n credentials become invalid after docker compose down/up.
  timeline:
    - "2026-04-09T03:00: docker compose down && up to apply env changes"
    - "2026-04-09T03:05: All credential tests fail — decryption error"
    - "2026-04-09T03:30: Root cause identified — encryption key regenerated"
  immediate_cause: >
    docker compose down removes the container; up creates a new one with
    a new auto-generated encryption key.
  root_cause: >
    n8n generates a random encryption key on first start. Without pinning
    it, each new container gets a different key and can't decrypt
    credentials stored with the old key.
  failed_attempts:
    - "Re-entering credentials manually: works but doesn't scale"
    - "Exporting/reimporting credentials: fails if key changed"
  solution: >
    Pin N8N_ENCRYPTION_KEY in docker-compose.yml environment section.
    Use docker compose restart (not down/up) for env var changes.
  prevention_action: >
    N8N_ENCRYPTION_KEY=forge-platform-encryption-key-2026 set in
    docker-compose.yml before any credentials are created.
  keywords:
    - n8n
    - encryption key
    - credentials
    - Docker Compose
    - down/up

