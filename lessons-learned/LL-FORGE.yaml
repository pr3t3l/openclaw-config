- id: LL-N8N-088
  date: 2026-04-11
  category: N8N
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Phase 8 artifact data is empty ({}) even though Claude generated
    valid output visible in P8_LLM_Chain output.
  timeline:
    - "2026-04-10: First run — Phase 8 data empty"
    - "2026-04-11: Second run — Phase 8 data empty again"
    - "2026-04-11: Root cause identified in Validator regex"
    - "2026-04-12: Data inserted manually via SQL"
  immediate_cause: >
    Validator regex fails to extract JSON from Claude's ```json wrapper,
    leaving parsed data as null, which Envelope converts to {}.
  root_cause: >
    n8n LLM Chain nodes wrap output in {text: "..."} object. When Claude
    adds ```json``` markdown fences, the Validator regex
    /```(?:json)?\s*([\s\S]*?)```/ may fail on edge cases (nested
    backticks, special characters), causing JSON.parse to throw, and p
    remains null → data becomes {}.
  failed_attempts:
    - "Checking SaveArtifact SQL — correct, problem is upstream"
    - "Checking Envelope node — correct, receives {} from Validator"
    - "Re-running Phase 8 — same result, reproducible bug"
  solution: >
    V1 workaround: manually insert Phase 8 data via SQL from LLM output.
    V1.1 fix: make Validator regex more robust — try multiple extraction
    strategies (strip markdown fences, try raw parse, try extracting
    first { to last }).
  prevention_action: >
    Add explicit logging in Validator to capture parse failures.
    Consider instructing Claude to NOT use markdown fences in system
    prompt.
  keywords:
    - n8n
    - Phase 8
    - empty data
    - Validator
    - regex
    - markdown fences
    - Claude
    - JSON parsing

- id: LL-N8N-089
  date: 2026-04-11
  category: N8N
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Cannot execute a single node in isolation — "Execute step" re-runs
    ALL upstream nodes, taking 3+ minutes.
  immediate_cause: >
    n8n needs input data for the node, so it executes the entire upstream
    chain.
  root_cause: >
    n8n doesn't cache node outputs between executions. Each "Execute
    step" is a fresh execution of the dependency chain.
  solution: >
    Use "Retry with currently saved workflow (from node with error)" in
    Executions tab — this resumes from the failed node using cached data
    from the original execution.
  prevention_action: >
    For iterative debugging: fix the node, then Retry from Executions tab
    instead of Execute step from Editor.
  keywords:
    - n8n
    - Execute step
    - upstream re-execution
    - debugging
    - Retry

