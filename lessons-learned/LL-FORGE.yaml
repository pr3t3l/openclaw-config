    ("leverage social media", "synergy", etc.). Flags at G2 but does NOT
    auto-fail — human decides.
  prevention_action: >
    generic_detector.js with 26 banned phrases, stored as metadata on
    Phase 8 artifact.
  keywords:
    - generic detection
    - banned phrases
    - quality
    - Phase 8
    - G2

- id: LL-QUAL-052
  date: 2026-04-08
  category: QUAL
  system: Forge/n8n
  severity: LOW
  status: VALIDATED
  problem_statement: >
    Banned language detection was flagging non-ASCII characters in valid
    English content (accented names, currency symbols).
  immediate_cause: >
    Detection used non-ASCII regex instead of specific token list.
  root_cause: >
    Conflating "non-English" with "non-ASCII."
  solution: >
    Banned language detection uses a specific token list (hispanohablante,
    España, español, en español), NOT non-ASCII detection.
  prevention_action: >
