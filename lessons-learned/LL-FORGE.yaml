- id: LL-PROC-062
  date: 2026-04-08
  category: PROC
  system: Forge
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Multi-model generation per phase (3 models generate, then merge)
    adds cost and complexity without proportional quality gain.
  immediate_cause: >
    Merge logic is complex and dilutes accountability.
  root_cause: >
    Generation is different from auditing — multi-model works for audit.
  solution: >
    V1: Single model per phase, assigned by task type. V1.5: add
    second-model AUDIT (not generation) on Phase 3 and Phase 8 only.
    Pattern: generate → audit → targeted repair.
  prevention_action: >
    WORKFLOW_SPEC §6 assigns exactly one model per phase.
  keywords:
    - multi-model
    - generation vs audit
    - cost
    - V1 vs V1.5

