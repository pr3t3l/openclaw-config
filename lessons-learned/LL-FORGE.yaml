    executing the old version.
  immediate_cause: >
    n8n reads from its internal database, not from disk files.
  root_cause: >
    Workflow import copies JSON into n8n's SQLite/PostgreSQL. Editing
    the source file doesn't update the internal copy.
  solution: >
    Re-import workflow JSON after every change using docker cp + n8n
    import:workflow.
  prevention_action: >
    Deploy script (scripts/deploy.ps1) automates: validate → copy →
    import → verify.
  keywords:
    - n8n
    - deploy
    - import
    - disk vs database
    - workflow sync

