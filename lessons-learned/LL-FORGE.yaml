- id: LL-OPS-082
  date: 2026-04-09
  category: OPS
  system: Forge/Docker
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    PowerShell rejects stdin redirection to Docker containers.
  immediate_cause: >
    PowerShell doesn't support the < operator for stdin.
  root_cause: >
    PowerShell syntax differs from bash.
  solution: >
    Use Get-Content file | docker exec -i or cmd /c "docker exec -i
    ... < file". Better: use WSL directly for all Docker operations.
  failed_attempts:
    - "docker exec -i container psql < file.sql — PowerShell error"
    - "Quoting the < operator — still fails"
  prevention_action: >
    Always use WSL for Docker commands, not PowerShell.
  keywords:
    - PowerShell
    - Docker
    - stdin
    - redirect
    - WSL

- id: LL-OPS-083
  date: 2026-04-09
  category: OPS
  system: Forge/Docker
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Environment variable changes in docker-compose.yml not picked up
    after docker compose restart.
  immediate_cause: >
    restart doesn't re-read the compose file for env changes.
  root_cause: >
    Docker Compose restart only restarts the container, doesn't recreate.
  solution: >
    Use docker compose down && up -d for env var changes. Be aware this
    can regenerate n8n encryption key (see LL-N8N-064).
  prevention_action: >
    Set N8N_ENCRYPTION_KEY first, then down/up is safe.
  keywords:
    - Docker Compose
    - restart
    - environment variables
    - down/up
  references:
    - LL-N8N-064

