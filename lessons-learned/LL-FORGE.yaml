- id: LL-ARCH-001
  date: 2026-04-08
  category: ARCH
  system: Forge/PostgreSQL
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Confusion about where to store product configuration — database vs
    config files vs environment variables.
  immediate_cause: >
    No clear convention established before build.
  root_cause: >
    Missing architectural decision about config storage layer.
  solution: >
    JSON config = source of truth for static config (works offline, no API
    rate limits). DB = live transactional data only. Rule: "if it can't be
    edited from the DB, it shouldn't be in the DB."
  prevention_action: >
    product_configs table stores JSONB config. Static product definitions
    never go in env vars or spreadsheets.
  keywords:
    - config
    - JSONB
    - PostgreSQL
    - product_configs
    - architecture

- id: LL-ARCH-022
  date: 2026-04-08
  category: ARCH
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    LLM used for tasks that are deterministic (counting, string matching,
    math), wasting tokens and adding latency.
  immediate_cause: >
    Default tendency to route everything through LLM nodes.
  root_cause: >
    No explicit decision rule for LLM vs deterministic.
  solution: >
    If a task can be done with string matching, math, or JSON traversal,
    do NOT use an LLM. LLMs are for synthesis and generation only.
  prevention_action: >
    Confidence Dashboard, Generic Detector, cost logger, structural
    validator, stale barrier — all implemented as deterministic Code nodes.
  keywords:
    - LLM
    - deterministic
    - cost
    - Function node
    - Code node

- id: LL-ARCH-033
  date: 2026-04-08
  category: ARCH
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Phase 8 LLM receives massive context (all 7 prior artifacts raw),
    exceeding token limits and producing unfocused output.
  immediate_cause: >
    No compression logic between artifact storage and LLM prompt.
  root_cause: >
    Missing specification of exact field paths per source phase.
  solution: >
    Input compression is mandatory. Extract ONLY the fields that phase
    needs. Define exact field paths, not "top N" or "relevant fields."
  prevention_action: >
    Phase 8 compression rules with deterministic field extraction defined
    in WORKFLOW_SPEC §5.
  keywords:
    - compression
    - context
    - tokens
    - Phase 8
    - prompt engineering

- id: LL-ARCH-040
  date: 2026-04-08
  category: ARCH
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Multiple ways to write artifacts (INSERT vs UPDATE vs UPSERT) causing
    inconsistent behavior.
  immediate_cause: >
    Different developers/sessions using different SQL patterns.
  root_cause: >
    No canonical write pattern established.
  solution: >
    UPSERT is the ONE write pattern. No INSERT-then-UPDATE alternatives.
    ON CONFLICT (product_id, phase_number, run_id) DO UPDATE.
  prevention_action: >
    SaveArtifact node uses single UPSERT query for all phases.
  keywords:
    - UPSERT
    - SQL
    - PostgreSQL
    - write pattern

- id: LL-ARCH-044
  date: 2026-04-08
  category: ARCH
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    No cost tracking after LLM calls — impossible to know how much a run
    costs.
  immediate_cause: >
    n8n does NOT auto-track LLM costs.
  root_cause: >
    n8n native LLM nodes don't expose usage metadata in an accessible way.
  solution: >
    Every LLM node needs a dedicated cost-logger Code node immediately
    after it. Gemini returns token usage in different field names than
    OpenAI/Anthropic.
  prevention_action: >
    CostLog node in Phase Finalize sub-workflow handles all 3 providers.
  keywords:
    - cost
    - tokens
    - LLM
    - Gemini
    - OpenAI
    - Anthropic
    - cost logger

- id: LL-ARCH-045
  date: 2026-04-08
  category: ARCH
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    SerpAPI returns 429 rate limit errors when multiple searches execute
    back-to-back.
  immediate_cause: >
    n8n does NOT auto-throttle HTTP Request nodes.
  root_cause: >
    SerpAPI has 1 req/sec rate limit; sequential nodes fire instantly.
  solution: >
    Add 1.1s Wait node between each SerpAPI HTTP Request call.
  prevention_action: >
    SplitInBatches loop includes Wait node in the loop-back path.
  keywords:
    - SerpAPI
    - rate limit
    - throttle
    - Wait node
    - HTTP Request

- id: LL-ARCH-046
  date: 2026-04-08
  category: ARCH
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Ambiguity about whether verified_facts lives inside artifact.data or
    at the envelope level, causing queries to miss data.
  immediate_cause: >
    LLM generates verified_facts inside its output; PostgreSQL column
    expects it at envelope level.
  root_cause: >
    No explicit hoisting convention documented.
  solution: >
    LLM generates the phase schema. Function node wraps it in the envelope
    and HOISTS verified_facts/assumptions to envelope level. PostgreSQL
    reads envelope level, never data.verified_facts.
  prevention_action: >
    Envelope wrapper Code node in Phase Finalize sub-workflow handles
    hoisting for all phases.
  keywords:
    - envelope
    - verified_facts
    - hoisting
    - JSONB
    - data model

