- id: LL-PROC-004
  date: 2026-04-08
  category: PROC
  system: Forge
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Module built to consume output from another module that doesn't
    exist yet — integration fails on first test.
  immediate_cause: >
    Build order not enforced.
  root_cause: >
    No dependency-aware build sequence.
  solution: >
    Never build a module that consumes another module's output before
    the producer module exists and is tested.
  prevention_action: >
    plan.md build phases enforce order: Phase 1 before Phase 2, etc.
  keywords:
    - build order
    - dependencies
    - integration

