- id: LL-COST-042
  date: 2026-04-08
  category: COST
  system: Forge/n8n
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Mini/nano models produce subtly wrong output that passes validation
    but degrades strategy quality.
  immediate_cause: >
    Temptation to use cheaper models for "simple" phases.
  root_cause: >
    All phases require synthesis, not just extraction — mini models lack
    this capability.
  solution: >
    Absolute rule: no mini/nano models anywhere. Use Sonnet, GPT-5.2, or
    Gemini 3.1 Pro for everything.
  prevention_action: >
    Model assignment table in WORKFLOW_SPEC §6 enforces minimum tier.
  keywords:
    - model selection
    - quality
    - mini models
    - nano models
    - cost vs quality

- id: LL-COST-043
  date: 2026-04-08
  category: COST
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Fixed budget thresholds don't scale with workflow complexity.
  immediate_cause: >
    8-phase workflow has different cost profile than a 3-phase workflow.
  root_cause: >
    Budget thresholds were hardcoded globally.
  solution: >
    Budget thresholds must be dynamic per workflow length. 8 phases → $3
    target / $10 ceiling. Store in product_config.budget_thresholds.
  prevention_action: >
    BudgetCheck reads from hardcoded values (V1) but designed for
    per-product override in V1.1.
  keywords:
    - budget
    - thresholds
    - cost ceiling
    - dynamic config

- id: LL-COST-047
  date: 2026-04-08
  category: COST
  system: Forge
  severity: HIGH
  status: VALIDATED
  problem_statement: >
    Cost estimates in SDD docs were 40-60% lower than actual production
    costs.
  immediate_cause: >
    Estimates didn't account for retries, longer contexts, and re-runs.
  root_cause: >
    Publishing estimates before measuring is inherently unreliable.
  solution: >
    Do NOT publish cost estimates before measuring. Measure after first 3
    production runs, then publish.
  failed_attempts:
    - "Estimating from model pricing pages: missed retry overhead"
    - "Cross-model review of estimates: all 3 models were equally optimistic"
  prevention_action: >
    All docs use TBD for costs until measured. HTML comments mark future
    measurement points.
  keywords:
    - cost estimates
    - accuracy
    - measurement
    - SDD

- id: LL-COST-048
  date: 2026-04-08
  category: COST
  system: Forge/n8n
  severity: MEDIUM
  status: VALIDATED
  problem_statement: >
    Search API costs silently excluded from budget tracking.
  immediate_cause: >
    Budget checker only summed LLM costs.
  root_cause: >
    Search calls weren't logged to phase_execution_log.
  solution: >
    Search API costs are real money (~$0.01/query × 10-16 queries per run
    = $0.10-0.16). Budget checks must SUM both call types.
  prevention_action: >
    phase_execution_log tracks call_type = 'search' alongside 'llm'.
    SearchCost PG nodes log each SerpAPI call.
  keywords:
    - SerpAPI
    - budget
    - cost tracking
    - search API

