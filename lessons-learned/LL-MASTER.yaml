  - id: LL-ARCH-033
    old_id: L-33
    date: unknown
    category: ARCH
    severity: HIGH
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      Full contracts passed to implementation planner caused timeouts.
      67% token reduction achieved via compress_contracts() fixed this.
    immediate_cause: >
      Passed full upstream JSON context to downstream heavy agent.
    root_cause: >
      No compression/filtering step before heavy agent calls.
    contributing_factors:
      - Assumed passing everything was safer than filtering
      - No token budget per agent call
    failed_attempts:
      - "Increased timeout — still timed out with full context"
      - "Reduced max_tokens output — did not fix input context size issue"
    solution: >
      Compress upstream context for heavy agents. Only include fields relevant
      to the agent's task. compress_contracts() + block_mode fallback.
    prevention_action: >
      Compress function mandatory before heavy agent calls. 67% reduction target.
    keywords: [context, compression, tokens, timeout, upstream, agents]
    applies_to: workflows
    references: []
    validated: true

  - id: LL-ARCH-034
    old_id: LL-ARCH-034
    date: "2026-04"
    category: ARCH
    severity: HIGH
    system: OpenClaw/Planner
    status: CONFIRMED
    problem_statement: >
      planner_state.json schema has `additionalProperties: false`. Transient
      fields (_intake_answers, _draft_content, _audit_result, etc.) caused
      schema validation errors when written to state dict.
    immediate_cause: >
      Transient data was written to planner_state.json which has strict schema.
    root_cause: >
      Design assumed state dict could hold any data; strict schema forbids it.
    contributing_factors:
      - Dispatcher pops `_gate_pending` before save, giving false impression
        that other transient fields were also handled
      - 573 unit tests with StubHandlers didn't catch this (stubs don't
        exercise schema validation path)
    failed_attempts:
      - "Added transient fields to state dict — crashed at save with schema error"
      - "Tried adding fields to schema — broke additionalProperties:false contract"
    solution: >
      Transient data goes to files in planner_runs/{run_id}/, NOT in state dict.
      State dict = schema fields only.
    prevention_action: >
      Schema validation catches at save time. Rule: if not in schema, it goes to a file.
    keywords: [state, schema, additionalProperties, transient, planner, strict]
    applies_to: both
    references: [LL-CODE-041, LL-PROC-033]
    validated: true

  - id: LL-ARCH-035
    old_id: LL-ARCH-035
    date: "2026-04"
    category: ARCH
    severity: HIGH
    system: OpenClaw/skills
    status: CONFIRMED
    problem_statement: >
      OpenClaw LLM reads Python files in workspace and simulates the workflow
      instead of executing via exec tool, even when SKILL.md instructs otherwise.
    immediate_cause: >
      LLM context contains the Python source files for the skill, so it
      simulates instead of executing.
    root_cause: >
      LLM defaults to reading and simulating code rather than executing it when
      code is visible in context.
    contributing_factors:
      - SKILL.md instructions alone not sufficient to override LLM behavior
      - Prior conversation context contaminates the session
    failed_attempts:
      - "Standard SKILL.md with exec instructions — LLM still simulated"
      - "Added 'MUST execute via exec tool' — insufficient without /reset"
      - "Added 'Do NOT read Python files' — insufficient without /reset"
    solution: >
      Ultra-strict SKILL.md with 'MUST execute via exec', 'Do NOT read Python
