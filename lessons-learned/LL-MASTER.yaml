  - id: LL-INFRA-001
    old_id: TL-01
    date: unknown
    category: INFRA
    severity: HIGH
    system: OpenClaw/WSL
    status: CONFIRMED
    problem_statement: >
      Python `requests` library fails on all API calls longer than ~30s in WSL.
      No exception is thrown — the call simply hangs and eventually silently fails.
    immediate_cause: >
      WSL networking stack does not handle long-lived HTTP connections reliably.
    root_cause: >
      Fundamental incompatibility between Python requests and WSL network layer
      for long-duration connections.
    contributing_factors:
      - No timeout configured initially
      - Silent failure made diagnosis slow
    failed_attempts:
      - "Increased timeout in requests — still hung"
      - "Used requests.Session() — same failure"
      - "asyncio parallel with requests — also fails (see LL-INFRA-014)"
    solution: >
      Use streaming curl via subprocess for all API calls in WSL.
      All scripts use litellm_stream.py pattern.
    prevention_action: >
      Always streaming. See CONSTITUTION §4. Never use Python requests for
      API calls in WSL.
    keywords: [WSL, requests, curl, streaming, subprocess, API, timeout]
    applies_to: workflows
    references: [LL-INFRA-005, LL-INFRA-014]
    validated: true

  - id: LL-INFRA-005
    old_id: TL-05
    date: unknown
    category: INFRA
    severity: MEDIUM
    system: OpenClaw/WSL
    status: CONFIRMED
    problem_statement: >
      subprocess timed out before curl finished, killing API calls that were
      actually in progress and would have succeeded.
    immediate_cause: >
      subprocess timeout was set equal to or less than curl --max-time.
    root_cause: >
      No rule requiring subprocess timeout to exceed curl timeout with buffer.
    contributing_factors:
      - Both timeouts set to same value assuming they were equivalent
    failed_attempts: unknown
    solution: >
      subprocess timeout MUST exceed curl --max-time. Buffer: subprocess_buffer (50s).
    prevention_action: >
      timeout = curl_max_time + 50s. Always add buffer.
    keywords: [subprocess, timeout, curl, buffer, WSL]
    applies_to: workflows
    references: [LL-INFRA-001]
    validated: false

