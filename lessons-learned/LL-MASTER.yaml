  - id: LL-PLAN-017
    old_id: L-17
    date: unknown
    category: PLAN
    severity: unknown
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Interview slips contained "remembers the timestamp perfectly" instead of
      specific factual states. Generic descriptions that could apply to any project.
    immediate_cause: >
      Quality gate did not reject vague, non-specific content.
    root_cause: >
      No requirement for concrete, verifiable details in outputs.
    contributing_factors:
      - LLM defaults to generic language without explicit constraints
    failed_attempts: unknown
