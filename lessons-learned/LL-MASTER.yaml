# ============================================================
# PLAN — Planning Failures
# ============================================================

lessons:

  - id: LL-PLAN-001
    old_id: L-01
    date: unknown
    category: PLAN
    severity: unknown        # FILL: HIGH | MEDIUM | LOW
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Artifacts were produced by agents with no downstream consumer.
      Experience Designer output was never consumed by renderer.
    immediate_cause: >
      Orphan outputs were allowed to exist without validation.
    root_cause: >
      Data flow was not planned before building agents. No requirement
      that every artifact have a declared consumer.
    contributing_factors:
      - No spec-level contract between producer and consumer
    failed_attempts: unknown  # FILL: what was tried before discovering this
    solution: >
      Plan data flow BEFORE building agents. Every artifact must have a consumer.
    prevention_action: >
      FAIL pipeline if orphan_outputs or missing_required_artifacts are non-empty.
    keywords: [data-flow, planning, artifacts, orphan-outputs]
    applies_to: both
    references: []
    validated: false

  - id: LL-PLAN-002
    old_id: L-02
    date: unknown
    category: PLAN
    severity: unknown
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Narrative Architect produced `usage_map` arrays; Art Director expected
      `for_doc` strings. Silent schema mismatch caused downstream failures.
    immediate_cause: >
      Producer and consumer had incompatible field types for the same contract.
    root_cause: >
      No schema contract was defined between producer-consumer pairs before building.
    contributing_factors:
      - No JSON examples in spec at contract definition time
    failed_attempts: unknown
    solution: >
      Define the contract (schema) between every producer-consumer pair BEFORE building.
    prevention_action: >
      Spec §2 must include JSON examples for all inter-agent contracts.
    keywords: [schema, contracts, producer-consumer, silent-failure]
    applies_to: both
    references: []
    validated: false

  - id: LL-PLAN-003
    old_id: L-03
    date: unknown
    category: PLAN
    severity: HIGH
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Applied 15 audit fixes, ran full case ($6+), renders still broken.
      Could have been caught with a 1-doc test at $0.10.
    immediate_cause: >
      Batch run executed before single-item E2E test.
    root_cause: >
      No policy requiring E2E test on one item before batch.
    contributing_factors:
      - Time pressure to see full results
      - No cost gate before batch runs
    failed_attempts: unknown
    solution: >
      Test ONE item end-to-end BEFORE batch. Never batch-run untested changes.
    prevention_action: >
      implementation-planner requires `test_minimum` per phase. Block batch
      if single-item test has not passed.
    keywords: [testing, batch, E2E, cost-waste]
    applies_to: both
    references: []
    validated: false

  - id: LL-PLAN-004
    old_id: L-04
    date: unknown
    category: PLAN
    severity: unknown
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Multiple V2 rewrites were started before V1 was validated as producing value.
    immediate_cause: >
      scope-framer recommended Advanced complexity as starting point.
    root_cause: >
      No policy blocking V2 scope until V1 produces real value.
    contributing_factors:
      - Excitement about features over fundamentals
    failed_attempts: unknown
    solution: >
      Don't build V2 until V1 produces value. "Feo pero funcional" beats
      "bonito pero incompleto."
    prevention_action: >
      scope-framer never recommends Advanced as starting point.
    keywords: [scope, V1, V2, MVP, planning]
    applies_to: both
    references: []
    validated: false

  - id: LL-PLAN-005
    old_id: L-05
    date: unknown
    category: PLAN
    severity: unknown
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Hours wasted mixing pipeline plumbing fixes with quality improvements
      in the same session, making it impossible to isolate what was broken.
    immediate_cause: >
      Infra fixes and quality tuning run in same session without separation.
    root_cause: >
      No policy separating "does it work?" from "is it good?" phases.
    contributing_factors:
      - Wanting to fix everything at once
    failed_attempts: unknown
    solution: >
      Separate "does it work?" from "is it good?" Never mix infra fixes
      with quality improvements in the same session.
    prevention_action: >
      Separate sessions for infra vs quality. Never combine.
    keywords: [process, debugging, infra, quality, separation-of-concerns]
    applies_to: both
    references: []
    validated: false

  - id: LL-PLAN-010
    old_id: L-10
    date: unknown
    category: PLAN
    severity: HIGH
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      clue_catalog had type_key='some_type', reveals='Reveals something about DOC-XX'.
      Stub/placeholder data passed validation and entered the pipeline.
    immediate_cause: >
      No structural validator rejecting placeholder patterns.
    root_cause: >
      Agents were not required to produce real content — stubs were accepted silently.
    contributing_factors:
      - No automated content-quality gate
