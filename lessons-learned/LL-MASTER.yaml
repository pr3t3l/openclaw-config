  - id: LL-ARCH-022
    old_id: L-22
    date: unknown
    category: ARCH
    severity: MEDIUM
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      20-line Python script did image injection perfectly. Hours of LLM prompt
