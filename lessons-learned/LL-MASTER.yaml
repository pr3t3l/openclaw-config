  - id: LL-ARCH-013
    old_id: L-13
    date: unknown
    category: ARCH
    severity: MEDIUM
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Type conversion left stale cross-references pointing to old document names.
      Downstream consumers failed silently with missing-reference errors.
    immediate_cause: >
