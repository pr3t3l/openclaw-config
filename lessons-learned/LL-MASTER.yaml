  - id: LL-PLAN-020
    old_id: L-20
    date: unknown
    category: PLAN
    severity: MEDIUM
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Visual instructions were split across 2 files; renderer only read 1.
      Output was incomplete and inconsistent.
    immediate_cause: >
      Spec for downstream agent was split across multiple files.
    root_cause: >
      No rule requiring a self-contained spec per consumer.
    contributing_factors:
