  - id: LL-PLAN-018
    old_id: L-18
    date: unknown
    category: PLAN
    severity: unknown
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      Art Director only generated portraits for 18 docs. Digital evidence
      documents received zero images despite needing visual support.
    immediate_cause: >
      Image brief planning was not part of spec for all document types.
    root_cause: >
