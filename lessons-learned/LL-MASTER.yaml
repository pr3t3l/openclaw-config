      Retried with same parameters after failure without understanding why it failed.
    root_cause: >
      No policy requiring failure diagnosis before retry.
    contributing_factors:
      - Hoped the issue was transient
    failed_attempts: unknown
    solution: >
      Never retry with identical parameters. Always include failure diagnosis.
      Max 2 retries.
    prevention_action: >
      Diagnosis in retry prompt. Max 2 retries before escalation.
      See CONSTITUTION §5.
    keywords: [retry, diagnosis, process, failures, cost-waste]
    applies_to: both
    references: []
    validated: false

