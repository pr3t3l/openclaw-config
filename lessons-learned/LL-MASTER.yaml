    references: []
    validated: false

# ============================================================
# ARCH — Architecture Decisions
# ============================================================

  - id: LL-ARCH-004
    old_id: TL-04
    date: unknown
    category: ARCH
    severity: HIGH
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      Sub-agents called via sessions_spawn completed with "(no output)" and 0 tokens.
      File writes silently failed. Confirmed broken 6+ times across multiple sessions.
    immediate_cause: >
      sessions_spawn does not have file write permissions in its execution context.
    root_cause: >
      sessions_spawn runs in a sandboxed context without filesystem access.
      Design assumption was wrong.
    contributing_factors:
      - sessions_spawn appeared to succeed (no error returned)
      - Failure was silent — no exception or error message
    failed_attempts:
      - "Retried sessions_spawn multiple times — same silent failure each time (6+ attempts)"
      - "Checked permissions on target directory — correct, problem was spawn context not filesystem"
    solution: >
      Use spawn scripts with direct file I/O. Direct API calls via spawn_agent.py
      (direct curl) replaced sessions_spawn.
    prevention_action: >
      All AGENTS.md entries say "NEVER use sessions_spawn for file writing."
      Use spawn_agent.py pattern.
    keywords: [sessions_spawn, file-io, agents, silent-failure, spawn]
    applies_to: workflows
    references: [LL-ARCH-006, LL-ARCH-007]
    validated: true

  - id: LL-ARCH-006
    old_id: L-06
    date: unknown
    category: ARCH
    severity: HIGH
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      sessions_spawn file writing failure discovered after 6 attempts building
      complex logic on top of it. All that work had to be redone.
    immediate_cause: >
      File I/O was not tested before building complex logic on top of it.
    root_cause: >
      No policy requiring trivial I/O verification on day 1 of any implementation.
    contributing_factors:
      - Assumed spawn method would work without testing
    failed_attempts:
      - "Attempted sessions_spawn with different file paths — all failed silently"
      - "Adjusted SKILL.md instructions — no effect on spawn I/O"
    solution: >
      Test file I/O on day 1. Before complex logic, verify spawn method
      reads/writes correctly with a trivial test.
    prevention_action: >
      Phase 1 of any implementation always tests I/O before building logic.
    keywords: [file-io, testing, day-1, spawn, validation]
    applies_to: both
    references: [LL-ARCH-004]
    validated: true

  - id: LL-ARCH-007
    old_id: L-07
    date: unknown
    category: ARCH
    severity: MEDIUM
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      Agent spawning for deterministic tasks was unreliable and added token cost
      without adding value over a direct API call.
    immediate_cause: >
      Chose agent spawning for a task that didn't require LLM judgment.
    root_cause: >
      No decision matrix distinguishing deterministic vs judgment tasks.
    contributing_factors:
      - Default to agents because infrastructure was already set up
    failed_attempts: unknown
    solution: >
      Direct API calls > agent spawning for deterministic tasks. Use agents
      for orchestration, direct calls for generation. spawn_agent.py (direct curl)
      is the replacement pattern.
    prevention_action: >
      Decision matrix: deterministic=script, judgment=agent. Script for
      deterministic, agent for judgment.
    keywords: [agents, scripts, deterministic, API-calls, spawn]
    applies_to: workflows
    references: [LL-ARCH-004, LL-ARCH-022]
    validated: false

  - id: LL-ARCH-008
    old_id: L-08
    date: unknown
    category: ARCH
    severity: HIGH
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      Narrative Architect was asked to produce both case-plan AND clue_catalog
      in a single call. The catalog was truncated and incomplete.
    immediate_cause: >
      Single agent call asked to produce two large output artifacts.
    root_cause: >
      No rule limiting each agent call to one output artifact.
    contributing_factors:
      - Assumed model could handle multiple large outputs in one call
    failed_attempts: unknown
    solution: >
      One agent = one skill = one output type. Split large outputs into
      separate calls.
    prevention_action: >
      Max one output artifact per agent call. Enforce in spec §2 contracts.
    keywords: [agents, output, truncation, single-responsibility]
    applies_to: workflows
    references: [LL-AI-017]
    validated: false

  - id: LL-ARCH-011
    old_id: L-11
    date: unknown
    category: ARCH
    severity: unknown
    system: OpenClaw/both
    status: CONFIRMED
    problem_statement: >
      Art briefs requested separate mugshots for the same POI across multiple
      documents, causing redundant generation cost and inconsistent assets.
    immediate_cause: >
      No canonical asset library — each agent regenerated assets independently.
    root_cause: >
      Assets were not defined as reusable canonical references in the spec.
    contributing_factors:
      - Each agent had its own brief without cross-referencing shared assets
    failed_attempts: unknown
    solution: >
      Canonical asset libraries: one version of shared assets, reference it.
      Don't regenerate.
    prevention_action: >
      Define canonical assets in spec, reference by ID. Never regenerate existing assets.
    keywords: [assets, canonical, reuse, cost, regeneration]
    applies_to: both
    references: [LL-ARCH-012]
    validated: false

