    solution: >
      No stub outputs. Never accept placeholder data. Validate ALL fields
      have real content.
    prevention_action: >
      Structural validator rejects any stub pattern (e.g. 'some_type', 'Reveals something').
    keywords: [validation, stubs, placeholders, quality-gate]
    applies_to: both
    references: []
    validated: false

  - id: LL-PLAN-016
    old_id: L-16
    date: unknown
    category: PLAN
    severity: LOW
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      DoorDash receipt revealed a key case detail too early in the envelope sequence.
    immediate_cause: >
      Early envelope content was too explicit rather than ambiguous.
    root_cause: >
      No pacing rule for information reveal across envelopes.
    contributing_factors:
      - Declassified-specific pacing not documented as a pattern
    failed_attempts: unknown
