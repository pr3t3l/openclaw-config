      when using hyphenated form.
    immediate_cause: >
      Telegram converts hyphens to underscores in bot commands.
    root_cause: >
      Skill directory name determines Telegram command; hyphens are illegal
      in Telegram commands and auto-converted.
    contributing_factors:
      - command: field in SKILL.md frontmatter does not override directory name
    failed_attempts:
      - "Used command: field in SKILL.md — ignored, directory name wins"
    solution: >
