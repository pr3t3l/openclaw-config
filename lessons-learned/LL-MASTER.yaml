    status: CONFIRMED
    problem_statement: >
      18 manual gates per run (G1,G3,G5 × 6 docs) generated friction without
      value when all responses were "approved." Developer productivity severely impacted.
    immediate_cause: >
      Gate frequency was not calibrated to project complexity.
    root_cause: >
      No auto-approve mode for simple/routine projects.
    contributing_factors:
      - Gates designed for complex projects, applied to all projects equally
    failed_attempts: unknown
    solution: >
      Auto-approve mode: "MODULE_SPEC auto" at G0 reduces gates from ~20 to 2
      (only G0 and G7). Exception: G3 always pauses if CRITICAL findings exist.
    prevention_action: >
      Offer auto-approve for simple projects. Always pause on CRITICAL findings.
    keywords: [gates, friction, auto-approve, Planner, process, productivity]
    applies_to: both
    references: [LL-PROC-PL09]
    validated: false

