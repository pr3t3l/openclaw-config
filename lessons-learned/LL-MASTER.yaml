  - id: LL-INFRA-037
    old_id: LL-INFRA-037
    date: "2026-04"
    category: INFRA
    severity: HIGH
    system: OpenClaw/skills
    status: CONFIRMED
    problem_statement: >
      OpenClaw LLM reads Python files in workspace and simulates the workflow
      instead of executing via exec tool. Any prior conversation context can
      trigger simulation mode.
    immediate_cause: >
      Python source files visible in LLM context cause it to simulate execution.
    root_cause: >
      LLM behavior: when code is visible in context, prefers reading+simulating
      over executing via tool.
    contributing_factors:
      - Prior conversation context compounds the problem
      - SKILL.md instructions alone insufficient
    failed_attempts:
      - "SKILL.md with exec instructions — LLM still simulated"
      - "Explicit 'MUST execute' in SKILL.md — insufficient without /reset"
    solution: >
      /reset before skill invocation clears LLM context and forces exec execution.
      Fragile — any prior conversation can revert behavior.
    prevention_action: >
      /reset before every skill invocation session. This is a known fragile
      workaround pending gateway upgrade.
    keywords: [OpenClaw, simulation, exec, reset, LLM-behavior, skills, context]
    applies_to: both
    references: [LL-ARCH-035, LL-INFRA-036]
    validated: true

