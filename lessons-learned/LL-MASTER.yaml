      Details must be concrete and verifiable, not vague. Reject anything
      that could apply to any project.
    prevention_action: >
      Reject generic descriptions in quality gate. Add "NEVER generic" rule to prompts.
    keywords: [quality, specificity, generic-output, LLM-prompting]
