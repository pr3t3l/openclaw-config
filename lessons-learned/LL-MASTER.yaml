  - id: LL-ARCH-032
    old_id: L-32
    date: unknown
    category: ARCH
    severity: MEDIUM
    system: OpenClaw/workflows
    status: CONFIRMED
    problem_statement: >
      Multi-agent debates produced unstructured, incomparable outputs.
      Judge agent could not compare proposals meaningfully.
    immediate_cause: >
      Debate format was unstructured — each model responded in free text.
    root_cause: >
      No JSON schema defined for debate proposals.
    contributing_factors:
      - Assumed structured output would emerge naturally from prompting
    failed_attempts: unknown
    solution: >
      Multi-agent debates: define JSON schema for "proposal", each model
      fills it, judge compares. spawn_debate.py uses JSON schema for all rounds.
    prevention_action: >
      JSON schema for all debate proposals. Judge receives structured inputs only.
    keywords: [multi-agent, debate, structured-output, JSON, judge]
