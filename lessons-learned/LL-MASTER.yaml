# ============================================================
# ESCALATION PATTERNS
# ============================================================

escalation_patterns:
  large_ai_output_failure:
    steps:
      - "Monolithic generation fails → split by domain/section"
      - "Domain-split fails → identify failing block, retry only that block"
      - "Per-block still fails → compact mode (schema + required + rules only)"
      - "JSON parse failure → auto-repair before declaring failure"
      - "Auto-retry up to 2 times before surfacing to human"
    rule: "Always save raw model output on failure before retrying"

  litellm_server_disconnect:
    steps:
      - "Verify with small max_tokens (500) — if works, issue is generation time"
      - "Add request_timeout: 600 to LiteLLM config"
      - "Switch to streaming via litellm_stream.py"
      - "Compress input context via compress_contracts()"
      - "If still fails: block-based generation via spawn_implementation_blocks.py"

