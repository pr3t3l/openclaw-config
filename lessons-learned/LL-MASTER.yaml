      Name skill directories with the Telegram command in mind (underscores).
    prevention_action: >
      Use underscores in skill directory names. Never hyphens.
    keywords: [OpenClaw, Telegram, skills, commands, hyphens, underscores, naming]
    applies_to: both
    references: []
    validated: true

